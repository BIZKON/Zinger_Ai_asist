# ── Rate limiting zones ──
limit_req_zone $binary_remote_addr zone=webhook:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

upstream bot_webhook {
    server bot:8080;
}

# ── HTTP → HTTPS redirect ──
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ──
server {
    listen 443 ssl http2;
    server_name _;

    # ── SSL ──
    ssl_certificate /etc/letsencrypt/live/personalai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/personalai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Security headers ──
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://telegram.org; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'" always;

    # ── Request limits ──
    client_max_body_size 50m;
    client_body_timeout 30s;
    client_header_timeout 15s;

    # ── Webhook endpoint ──
    location /webhook {
        limit_req zone=webhook burst=20 nodelay;
        proxy_pass http://bot_webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Payment webhook (ЮKassa) ──
    location /payment/webhook {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://bot_webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Voice WebSocket (call engine) ──
    location /voice/ {
        proxy_pass http://bot_webhook;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    # ── Mini App static files ──
    location /miniapp/ {
        alias /var/www/miniapp/;
        try_files $uri $uri/ /miniapp/index.html;

        # CORS for Telegram Mini App
        add_header Access-Control-Allow-Origin "https://web.telegram.org" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        # Cache static assets
        location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Health check ──
    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # ── Block everything else ──
    location / {
        return 404;
    }
}
