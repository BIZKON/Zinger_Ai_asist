# Polling mode override for Timeweb VPS without a domain.
# Nginx is not needed — bot uses outbound polling to api.telegram.org.
#
# Usage:
#   docker compose -f docker-compose.polling.yml up -d --build
#   docker compose -f docker-compose.polling.yml exec bot python -m bot.migrate

services:
  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
      target: prod
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-personalai}
      POSTGRES_USER: ${POSTGRES_USER:-personalai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-personalai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  pgdata:
  redisdata:
